name: sport_finding
description: "SportFinding — find players and matches near you."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.5+1
  flutter_svg: ^2.2.4
  pinput: ^6.0.2
  intl: ^0.20.2
  image_picker: ^1.2.1
  http: ^1.6.0
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  google_sign_in: ^7.2.0
  file_picker: ^11.0.2
  cross_file: ^0.3.5+2
  http_parser: ^4.1.2
  shared_preferences: ^2.5.5
  geolocator: ^14.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  remove_alpha_ios: true

flutter:

  uses-material-design: true

  assets:
    - assets/logo/
    - assets/icon/
    - assets/sport/
    - assets/bottomBarIcon/
    - assets/onBoarding/
    - assets/profile/

  fonts:
    - family: Nunito
      fonts:
        - asset: assets/font/Nunito-Regular.ttf
        - asset: assets/font/Nunito-Bold.ttf
          weight: 700
